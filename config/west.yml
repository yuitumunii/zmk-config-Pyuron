manifest:
  remotes:
    - name: zmkfirmware 
      url-base: https://github.com/zmkfirmware
    - name: MeowCatpawkittie
      url-base: https://github.com/MeowCatpawkittie
    - name: caksoylar
      url-base: https://github.com/caksoylar  
    - name: badjeff
      url-base: https://github.com/badjeff
    - name: zettaface
      url-base: https://github.com/zettaface
    - name: yuitumunii
      url-base: https://github.com/yuitumunii
  projects:
    # 自前fork: cormoran custom-studio-protocol ベース(カスタムStudio RPC基盤) +
    # Pyuron 1行修正 + hold-tap(&mt/&lt) timing の RAM化 + pyuron_timing RPC。
    # 二役キーの tapping-term-ms / quick-tap-ms / flavor を焼かずにライブ調整。
    # 要 conf の CONFIG_PYURON_TIMING_STUDIO_RPC=y。
    - name: zmk
      remote: yuitumunii
      revision: pyuron+custom-studio+timing
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: main
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
    - name: zmk-input-processor-keybind
      remote: zettaface
      revision: main
  self:
    path: config
