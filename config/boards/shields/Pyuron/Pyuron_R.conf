CONFIG_ZMK_KEYBOARD_NAME="Pyuron"

CONFIG_ZMK_POINTING=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_INPUT=y
CONFIG_SPI=y
CONFIG_PINCTRL=y

CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

#CONFIG_ZMK_BLE_THREAD_STACK_SIZE=3072
#CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=2048
#CONFIG_INPUT_THREAD_STACK_SIZE=4096
#CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=3072
#CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=4096
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# === DIAGNOSTIC (2026-06-10): power-saving disabled to isolate freeze cause ===
# Revert this block to restore battery life once the culprit is found.
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=3600000
#CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SWAP_XY=y
CONFIG_PMW3610_ALT_INVERT_X=n
CONFIG_PMW3610_ALT_INVERT_Y=n
CONFIG_PMW3610_ALT_SMART_ALGORITHM=n
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=15
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000
# NOTE: max is 3264ms (hardware-encoded); sensor rest cannot be disabled this way
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=300

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ジェスチャー感度(tick/wait-ms 等)を焼かずにアプリからライブ調整する
# カスタム Studio RPC サブシステム(pyuron_gesture)。
CONFIG_ZMK_INPUT_PROCESSOR_KEYBIND_STUDIO_RPC=y
# get レスポンス(GestureInfo)が既定64Bにやや近いので余裕を持たせる。
CONFIG_ZMK_STUDIO_RPC_TX_BUF_SIZE=128
# ジェスチャー調整値をNVSに保存し再起動後も保持(zip_keybind settings handler)。
CONFIG_SETTINGS=y
